<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="src/styles/style.css">
</head>

<body>

    <h1>Expense Tracker</h1>

    <div>
        <h2>Balance: ₹<span id="balance">0</span></h2>
    </div>

    <input id="title" placeholder="Transaction title"><br><br>
    <input id="amount" type="number" placeholder="Amount"> <br><br>


    <select id="category">
        <option value="Food">Food</option>
        <option value="Shopping">Shopping</option>
        <option value="Credit">Credit</option>
        <option value="Electricity">Electricity</option>
        <option value="Rent">Rent</option>
        <option value="Stocks">Stocks</option>

    </select>
    <br><br>
    <button id="addBtn">Add Transaction</button>
    <br><br>
    <!-- search bar -->
    <input type="text" id="search" placeholder="Search">
    <table id="transactionTable">
        <thead>
            <tr>
                <th>Title</th>
                <th>Amount</th>
                <th>Category</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="transactionBody"></tbody>
    </table>
    <template id="transactionRow">
        <tr>
            <td class="t-title"></td>
            <td class="t-amount"></td>
            <td class="t-category"></td>
            <td>
                <button class="edit-btn">Edit</button>
                <button class="delete-btn">Delete</button>
            </td>
        </tr>
    </template>

    <!-- IMPORTANT: Use modules -->
    <script type="module" src="dist/app.js"></script>

</body>

</html>
